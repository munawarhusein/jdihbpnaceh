name: jdihbpnaceh

services:
  # ==========================================
  # PostgreSQL 16
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: jdih_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-jdih_db}
      POSTGRES_USER: ${DB_USER:-jdih_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jdih_secret_2024}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jdih_user} -d ${DB_NAME:-jdih_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jdih_network

  # ==========================================
  # Redis 7
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: jdih_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-jdih_redis_2024} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-jdih_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jdih_network

  # ==========================================
  # Elasticsearch 8
  # ==========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: jdih_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - cluster.name=jdih-cluster
      - bootstrap.memory_lock=true
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - jdih_network

  # ==========================================
  # MinIO (S3-compatible object storage)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: jdih_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-jdih_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-jdih_minio_secret_2024}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - jdih_network

  # ==========================================
  # MinIO Init (buat bucket otomatis)
  # ==========================================
  minio-init:
    image: minio/mc:latest
    container_name: jdih_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-jdih_minio} ${MINIO_SECRET_KEY:-jdih_minio_secret_2024};
      mc mb --ignore-existing local/${MINIO_BUCKET:-jdih-dokumen};
      mc anonymous set download local/${MINIO_BUCKET:-jdih-dokumen}/public;
      echo 'MinIO bucket initialized.';
      "
    networks:
      - jdih_network

  # ==========================================
  # Kibana (Dev only — monitoring ES)
  # ==========================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: jdih_kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - jdih_network
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  es_data:
  minio_data:

networks:
  jdih_network:
    driver: bridge
